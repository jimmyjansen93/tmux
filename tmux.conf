#----- Tmux options

# Use Control-space as a prefix
unbind C-b
# F11 is set within Wezterm to c-Space
unbind c-Space
set-option -g prefix F11
bind-key F11 send-prefix

# set 256 color mode
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Set tmux copy mode to vi bindings - C-[
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Turn mouse off 
set -g mouse off

# Keep tmux daemon running in the background
set -s exit-empty off

# Start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Turn off automatic renaming
set-option -wg allow-rename off

# Put status bar at the top
set-option -g status-position top

# Increase history limit
set-option -g history-limit 5000

# Toggle between last window
bind Space last-window

# Use - and _ for splitting windows
unbind "'"
unbind %
bind - split-window -h
bind _ split-window -v

# switch panes using C-hjkl and take vim into account 
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?\.?(view|n?vim?x?)(-wrapped)?(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' { if -F '#{pane_at_left}' '' 'select-pane -L' }
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' { if -F '#{pane_at_bottom}' '' 'select-pane -D' }
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' { if -F '#{pane_at_top}' '' 'select-pane -U' }
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' { if -F '#{pane_at_right}' '' 'select-pane -R' }

# Switch between windows 
bind C-l next-window
bind C-h previous-window

set -g status-interval 2

#----- Installed plugins
# install prefix+I, update prefix+U, remove prefix+m+u
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "catppuccin/tmux"
set -g @plugin "jaclu/tmux-power-zoom"
set -g @plugin "jaclu/tmux-menus"
set -g @plugin "27medkamal/tmux-session-wizard"
set -g @plugin "tmux-plugins/tmux-battery"

#----- Plugin configuration

# Power zoom config
unbind "f"
unbind "z"
set -g @power_zoom_trigger "f"

# Catppuccin theme configuration
set -g @catppuccin_flavour "macchiato"
set -g @catppuccin_status_background "#1e1e2e"
set -g @catppuccin_pane_border_style "fg=#f5a97f" 
set -g @catppuccin_pane_active_border_style "fg=#f5a97f"
set -g pane-border-lines heavy
set -g @catppuccin_date_time_text "%d-%B %H:%M"

set -g @catppuccin_window_left_separator " "
set -g @catppuccin_window_right_separator ""
set -g @catppuccin_window_middle_separator "█ "
set -g @catppuccin_window_number_position "left"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_default_text "#W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text "#W"

set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"

set -g @catppuccin_gitmux_text "#(gitmux -cfg $HOME/.config/tmux/gitmux.conf \"#{pane_current_path}\")"

set -g @catppuccin_directory_text "#(curr_dir)"

set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_modules_right "directory gitmux battery date_time"

# Autoreload config
set -g @tmux-autoreload-quiet 0

# Session wizard - open with prefix+p
set -g @session-wizard "p" 

# Tmux battery conf
set -g @batt_icon_status_attached "🔌"

#----- Running TPM at the end 
run "~/.config/tmux/plugins/tpm/tpm"
